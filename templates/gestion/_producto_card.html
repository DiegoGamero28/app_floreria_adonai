{% load static %}
<div class="card product-card h-100">
  {% if producto.imagen %}
    <img src="{{ producto.imagen.url }}" class="card-img-top product-img" alt="{{ producto.nombre }}">
  {% else %}
    <img src="{% static 'img/placeholder_producto.svg' %}" class="card-img-top product-img" alt="{{ producto.nombre }}">
  {% endif %}
  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
      <span class="badge text-bg-light">{{ producto.categoria.nombre }}</span>
      {% if producto.stock_bajo %}
        <span class="badge text-bg-warning">Stock bajo</span>
      {% endif %}
    </div>
    <h3 class="h5 card-title">{{ producto.nombre }}</h3>
    <p class="card-text text-muted small flex-grow-1">{{ producto.descripcion|truncatechars:95 }}</p>
    <div class="d-flex align-items-center justify-content-between mb-3">
      <strong class="price">S/ {{ producto.precio|floatformat:2 }}</strong>
      <span class="small text-muted">Stock: {{ producto.stock }}</span>
    </div>
    <form method="get" action="{% url 'gestion:comprar_producto' producto.id %}" class="d-flex gap-2">
      <input class="form-control quantity-input" type="number" name="cantidad" min="1" max="{{ producto.stock }}" value="1" aria-label="Cantidad" {% if producto.stock == 0 %}disabled{% endif %}>
      <button class="btn btn-primary flex-grow-1" type="submit" {% if producto.stock == 0 %}disabled{% endif %}>Comprar</button>
    </form>
  </div>
</div>
